services:
  api:
    command: ["sh", "-c", "apt-get update -qq && apt-get install -y --no-install-recommends curl unzip openssl ca-certificates && rm -rf /var/lib/apt/lists/* && cd /tmp && curl -fsSL https://github.com/pmclean1964/metashelfv2/archive/refs/heads/main.zip -o repo.zip && unzip -o repo.zip && cp -r metashelfv2-main/media-metadata-api/. /app/ && cd /app && npm ci --omit=dev && npx prisma generate && npx prisma migrate deploy && node src/index.js"]
    container_name: api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-media_user}:${POSTGRES_PASSWORD:-media_pass}@db:5432/${POSTGRES_DB:-media_db}
      LOG_LEVEL: info
      NODE_ENV: production
      PORT: 3000
      PRISMA_ENGINES_CHECKSUM_IGNORE_MISSING: '1'
      UPLOAD_DIR: /app/uploads
    image: node:20-slim
    ports:
      - '3000:3000'
    restart: unless-stopped
    volumes:
      - /mnt/store1/apps/metashelf/uploads:/app/uploads
    working_dir: /app
  db:
    container_name: db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-media_db}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-media_pass}
      POSTGRES_USER: ${POSTGRES_USER:-media_user}
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 10s
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-media_user} -d ${POSTGRES_DB:-media_db}
      timeout: 5s
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - /mnt/store1/apps/metashelf/postgres:/var/lib/postgresql/data
